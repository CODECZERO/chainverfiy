version: "3.8"

services:
  haproxy:
    image: haproxy:alpine
    ports:
      - "80:80"
      - "443:443"
    user: root
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/certs:/usr/local/etc/haproxy/certs
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache openssl &&
      if [ ! -f /usr/local/etc/haproxy/certs/fallback.pem ]; then
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /tmp/key.pem -out /tmp/crt.pem -subj '/CN=localhost' &&
        cat /tmp/crt.pem /tmp/key.pem > /usr/local/etc/haproxy/certs/fallback.pem;
      fi &&
      haproxy -f /usr/local/etc/haproxy/haproxy.cfg
      "
    depends_on:
      - frontend
      - server
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./haproxy/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chainverify
      POSTGRES_USER: chainverify
      POSTGRES_PASSWORD: chainverify_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainverify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://chainverify:chainverify_secret@postgres:5432/chainverify
      - REDIS_URL=redis://redis:6379
      - SOROBAN_RPC_URL=${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      - BLOCKCHAIN_NETWORK=${BLOCKCHAIN_NETWORK:-https://horizon-testnet.stellar.org}
      - STACK_ADMIN_SECRET=${STACK_ADMIN_SECRET}
      - ESCROW_CONTRACT_ID=${ESCROW_CONTRACT_ID}
      - ATS=${ATS}
      - RTS=${RTS}
      - ATE=${ATE:-15m}
      - RTE=${RTE:-7d}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - PINATA_JWT=${PINATA_JWT}
      - PINATA_GATEWAY=${PINATA_GATEWAY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        # Defaults to the AWS EC2 IP if not overridden by .env
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://54.205.8.204/api}
        - NEXT_PUBLIC_APP_NAME=ChainVerify
        - NEXT_PUBLIC_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-14155238886}
        - NEXT_PUBLIC_APP_URL=${APP_URL:-https://54.205.8.204}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
