global
    log stdout format raw local0
    maxconn 2000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend gateway
    bind *:80
    # HAProxy requires at least one valid certificate to bind to 443 with ssl
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/

    # Route Let's Encrypt HTTP-01 challenges to the certbot backend
    acl is_acme path_beg /.well-known/acme-challenge/
    use_backend certbot if is_acme

    # Redirect HTTP to HTTPS (except for ACME challenges)
    http-request redirect scheme https unless { ssl_fc } || is_acme

    # API Routing
    acl is_api path_beg /api
    use_backend api if is_api

    # Default to frontend
    default_backend frontend

backend certbot
    server certbot certbot:80

backend api
    # Forward the original host and IP
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    server server1 server:8000 check

backend frontend
    # Forward the original host and IP
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    server frontend1 frontend:3000 check
